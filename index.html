<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>workFLOW + | Vendor Locator</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <style>
        /* Global Styles & Reset */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Raleway', sans-serif; }
        body { display: flex; height: 100vh; background-color: #f4f6f9; color: #333; overflow: hidden; }
        a { text-decoration: none; }
        
        /* Variables from workFLOW+ */
        :root {
            --sidebar-bg: #3a3b40;
            --sidebar-hover: #4a4b50;
            --gold: #FFC600; 
            --gold-hover: #e5b200;
            --text-light: #f1f1f1;
            --border: #e0e0e0;
        }

        /* Sidebar */
        .sidebar { width: 280px; background-color: var(--sidebar-bg); color: var(--text-light); display: flex; flex-direction: column; flex-shrink: 0; }
        .sidebar-header { padding: 20px; font-size: 24px; font-weight: bold; display: flex; align-items: center; border-bottom: 1px solid #2a2b30; color: var(--gold); }
        .sidebar-header .logo-text { color: white; margin-left: 8px; font-weight: 800; letter-spacing: 0.5px; }
        .sidebar-header .logo-plus { color: var(--gold); font-size: 34px; font-weight: 800; margin-left: 3px; line-height: 1; }
        
        .menu-item { padding: 15px 20px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #4a4b50; font-size: 14px; font-weight: 600; transition: 0.2s; }
        .menu-item:hover, .menu-item.active { background-color: var(--sidebar-hover); color: var(--gold); }
        
        /* Sidebar Truck Graphic & Animations */
        .sidebar-truck { margin-top: auto; padding: 30px; text-align: center; border-top: 1px solid #4a4b50; background: #2a2b30; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes bump { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-1.5px); } }
        @keyframes moveRoad { from { stroke-dashoffset: 0; } to { stroke-dashoffset: 15; } }
        
        .logo-spin { animation: spin 4s linear infinite; transform-origin: center; display: inline-block; }
        .moving-truck-svg { overflow: visible; }
        .truck-body { animation: bump 0.4s ease-in-out infinite; }
        .wheel { animation: spin 0.8s linear infinite; }
        .road-line { animation: moveRoad 0.4s linear infinite; }

        /* Main Content Area */
        .main-content { flex-grow: 1; display: flex; flex-direction: column; overflow-y: auto; overflow-x: hidden; }
        
        /* Top Navigation Bar & Dropdowns */
        .top-bar { background: #fff; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); z-index: 10; flex-shrink: 0; }
        .search-container input { padding: 10px 15px; width: 400px; border: 1px solid var(--border); border-radius: 4px; font-size: 14px; outline: none; transition: border-color 0.2s; }
        .search-container input:focus { border-color: var(--gold); }
        
        /* Tables & Content */
        .view-section { padding: 30px; }
        .view-title { font-size: 24px; margin-bottom: 15px; color: #333; font-weight: 700; }
        
        .table-wrapper { background: #fff; border-radius: 6px; box-shadow: 0 2px 6px rgba(0,0,0,0.08); padding: 20px; margin-top: 10px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; text-align: left; }
        th { background: #f4f6f9; padding: 12px; color: #555; text-transform: uppercase; font-size: 11px; border-bottom: 2px solid var(--border); font-weight: 700; }
        td { padding: 12px; border-bottom: 1px solid var(--border); font-weight: 500; }
        tr:hover td { background-color: #fcfcfc; }
        a.email-link { color: #0066cc; font-weight: 700; }
        a.email-link:hover { text-decoration: underline; }
        .no-data { text-align: center; padding: 2rem; color: #888; font-style: italic; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header">
            <svg class="logo-spin" width="30" height="30" viewBox="0 0 100 100">
                <circle cx="50" cy="50" r="40" fill="none" stroke="var(--gold)" stroke-width="10"/>
                <circle cx="50" cy="50" r="10" fill="var(--gold)"/>
                <g stroke="var(--gold)" stroke-width="10" stroke-linecap="round">
                    <line x1="50" y1="50" x2="50" y2="15" />
                    <line x1="50" y1="50" x2="83" y2="39" />
                    <line x1="50" y1="50" x2="70" y2="78" />
                    <line x1="50" y1="50" x2="30" y2="78" />
                    <line x1="50" y1="50" x2="17" y2="39" />
                </g>
            </svg>
            <span class="logo-text">workFLOW</span>
            <span class="logo-plus">+</span>
        </div>

        <div class="menu-item active" id="tab-garda" onclick="switchTab('Garda')">Garda Vendors</div>
        <div class="menu-item" id="tab-brinks" onclick="switchTab('Brinks')">Brinks Vendors</div>
        
        <div class="sidebar-truck">
            <svg width="140" height="70" viewBox="0 0 120 60" xmlns="http://www.w3.org/2000/svg" class="moving-truck-svg">
                <line class="road-line" x1="0" y1="57" x2="120" y2="57" stroke="#4a4b50" stroke-width="2" stroke-dasharray="10 5"/>
                <g class="truck-body">
                    <rect x="5" y="15" width="70" height="35" fill="var(--gold)" rx="3"/>
                    <path d="M78 25 H 92 L 105 35 V 50 H 78 Z" fill="var(--gold)"/>
                    <path d="M78 50 H 105" stroke="var(--gold)" stroke-width="2"/>
                    <path d="M82 28 H 90 L 98 35 H 82 Z" fill="#2a2b30"/>
                    <rect x="75" y="42" width="3" height="4" fill="#888"/>
                    <line x1="15" y1="25" x2="65" y2="25" stroke="#c49a1d" stroke-width="1.5"/>
                </g>
                <g class="wheel" style="transform-origin: 25px 50px;">
                    <circle cx="25" cy="50" r="7" fill="#111" stroke="#888" stroke-width="1.5"/>
                    <circle cx="25" cy="50" r="2" fill="#888"/>
                    <line x1="25" y1="43" x2="25" y2="57" stroke="#888" stroke-width="1"/>
                    <line x1="18" y1="50" x2="32" y2="50" stroke="#888" stroke-width="1"/>
                </g>
                <g class="wheel" style="transform-origin: 60px 50px;">
                    <circle cx="60" cy="50" r="7" fill="#111" stroke="#888" stroke-width="1.5"/>
                    <circle cx="60" cy="50" r="2" fill="#888"/>
                    <line x1="60" y1="43" x2="60" y2="57" stroke="#888" stroke-width="1"/>
                    <line x1="53" y1="50" x2="67" y2="50" stroke="#888" stroke-width="1"/>
                </g>
                <g class="wheel" style="transform-origin: 92px 50px;">
                    <circle cx="92" cy="50" r="7" fill="#111" stroke="#888" stroke-width="1.5"/>
                    <circle cx="92" cy="50" r="2" fill="#888"/>
                    <line x1="92" y1="43" x2="92" y2="57" stroke="#888" stroke-width="1"/>
                    <line x1="85" y1="50" x2="99" y2="50" stroke="#888" stroke-width="1"/>
                </g>
            </svg>
        </div>
    </div>

    <div class="main-content">
        <div class="top-bar">
            <div class="search-container">
                <input type="text" id="location-search" list="locations" placeholder="Search or Select Location Group..." oninput="filterTable()">
                <datalist id="locations"></datalist>
            </div>
        </div>

        <div class="view-section">
            <div class="view-title" id="view-title-text">Garda Vendors</div>
            
            <div class="table-wrapper">
                <table id="vendor-table">
                    <thead>
                        <tr>
                            <th>Vendor Name</th>
                            <th>Contact Email</th>
                            <th>Contact Phone</th>
                        </tr>
                    </thead>
                    <tbody id="table-body">
                        <tr><td colspan="3" class="no-data">Initializing Data Fetch...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // --- APP LOGIC --- //
        let currentDataset = 'Garda';
        let parsedData = { Garda: [], Brinks: [] };

        const searchInput = document.getElementById('location-search');
        const dataList = document.getElementById('locations');
        const tableBody = document.getElementById('table-body');
        const titleText = document.getElementById('view-title-text');

        // 1. Fetch and Parse the Excel File
        async function loadExcelFile() {
            try {
                tableBody.innerHTML = '<tr><td colspan="3" class="no-data">Loading vendor data...</td></tr>';
                
                // Fetch the file locally or from the server
                const response = await fetch('./vendor_locator.xlsx');
                
                if (!response.ok) throw new Error('File not found or access denied');
                
                const arrayBuffer = await response.arrayBuffer();
                const workbook = XLSX.read(arrayBuffer, { type: 'array' });
                
                // 2. Extract data from the specific tabs
                if (workbook.SheetNames.includes('Garda')) {
                    parsedData.Garda = formatExcelData(XLSX.utils.sheet_to_json(workbook.Sheets['Garda']));
                }
                if (workbook.SheetNames.includes('Brinks')) {
                    parsedData.Brinks = formatExcelData(XLSX.utils.sheet_to_json(workbook.Sheets['Brinks']));
                }

                // 3. Initialize the UI
                populateDropdown();
                switchTab(currentDataset); 

            } catch (error) {
                console.error("Error loading Excel file:", error);
                tableBody.innerHTML = `<tr><td colspan="3" class="no-data" style="color: #d9534f;"><b>Error:</b> Could not load vendor_locator.xlsx. <br><br>Ensure the file is in the same folder. If you are testing this locally on your desktop, browser security settings (CORS) may block local file fetching. Host it on a server or use a local dev server to test.</td></tr>`;
            }
        }

        // Map the Excel columns to our table format
        function formatExcelData(jsonArray) {
            return jsonArray.map(row => ({
                group: (row['Group'] || '').toString().trim(),
                vendor: (row['Vendor'] || '').toString().trim(),
                email: (row['Contact Email'] || 'N/A').toString().trim(),
                phone: (row['Contact Phone#'] || 'N/A').toString().trim()
            })).filter(item => item.group !== ''); 
        }

        function switchTab(tabName) {
            currentDataset = tabName;
            
            // Update UI styling for Sidebar
            document.querySelectorAll('.menu-item').forEach(btn => btn.classList.remove('active'));
            document.getElementById('tab-' + tabName.toLowerCase()).classList.add('active');
            
            titleText.innerText = tabName + ' Vendors';
            
            // Reset search and table
            searchInput.value = '';
            
            if (parsedData[currentDataset].length === 0) {
                tableBody.innerHTML = '<tr><td colspan="3" class="no-data">No data found in the ' + tabName + ' tab.</td></tr>';
            } else {
                tableBody.innerHTML = '<tr><td colspan="3" class="no-data">Select a location to view vendors</td></tr>';
            }
            
            populateDropdown();
        }

        function populateDropdown() {
            const uniqueLocations = [...new Set(parsedData[currentDataset].map(item => item.group))].sort();
            dataList.innerHTML = '';
            uniqueLocations.forEach(loc => {
                const option = document.createElement('option');
                option.value = loc;
                dataList.appendChild(option);
            });
        }

        function filterTable() {
            const searchTerm = searchInput.value.toLowerCase();
            const filteredData = parsedData[currentDataset].filter(item => item.group.toLowerCase() === searchTerm);

            if (filteredData.length === 0) {
                if(searchTerm === '') {
                    tableBody.innerHTML = '<tr><td colspan="3" class="no-data">Select a location to view vendors</td></tr>';
                } else {
                    tableBody.innerHTML = '<tr><td colspan="3" class="no-data">No vendors found for this location.</td></tr>';
                }
                return;
            }

            tableBody.innerHTML = filteredData.map(item => `
                <tr>
                    <td><strong>${item.vendor}</strong></td>
                    <td>${item.email !== 'N/A' ? `<a href="mailto:${item.email}" class="email-link">${item.email}</a>` : 'N/A'}</td>
                    <td>${item.phone}</td>
                </tr>
            `).join('');
        }

        // Trigger the load function when the DOM is ready
        window.addEventListener('DOMContentLoaded', loadExcelFile);
    </script>
</body>
</html>
